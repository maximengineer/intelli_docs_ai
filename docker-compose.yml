services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: intellidocs
      POSTGRES_USER: intellidocs
      POSTGRES_PASSWORD: intellidocs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellidocs -d intellidocs"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://intellidocs:intellidocs@postgres:5432/intellidocs
      ENABLE_LLM: ${ENABLE_LLM:-false}
      EMBEDDING_BACKEND: hash
      REQUIRE_DATABASE_READY: "true"
      VECTOR_STORE_BACKEND: postgres
      DOCUMENT_PROCESSING_BACKEND: ${DOCUMENT_PROCESSING_BACKEND:-thread}
      UPLOAD_STORAGE_DIR: /app/data/uploads
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - uploads_data:/app/data/uploads
    ports:
      - "${BACKEND_PORT:-7777}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3)); raise SystemExit(0 if payload.get('status') == 'ready' else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://intellidocs:intellidocs@postgres:5432/intellidocs
      ENABLE_LLM: ${ENABLE_LLM:-false}
      EMBEDDING_BACKEND: hash
      VECTOR_STORE_BACKEND: postgres
      DOCUMENT_PROCESSING_BACKEND: ${DOCUMENT_PROCESSING_BACKEND:-thread}
      UPLOAD_STORAGE_DIR: /app/data/uploads
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - uploads_data:/app/data/uploads
    command: celery -A worker.worker.celery_app worker --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      INTELLIDOCS_API_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-9999}:8501"
    depends_on:
      backend:
        condition: service_healthy

  tests:
    profiles:
      - test
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENABLE_LLM: "false"
      EMBEDDING_BACKEND: hash
      VECTOR_STORE_BACKEND: memory
      DATABASE_URL: ""
      DOCUMENT_PROCESSING_BACKEND: thread
      UPLOAD_STORAGE_DIR: /tmp/intellidocs-test-uploads
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: pytest

  live-tests:
    profiles:
      - live-test
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_LLM: "true"
      DATABASE_URL: postgresql://intellidocs:intellidocs@postgres:5432/intellidocs
      VECTOR_STORE_BACKEND: postgres
      EMBEDDING_BACKEND: ${LIVE_EMBEDDING_BACKEND:-hash}
      DOCUMENT_PROCESSING_BACKEND: ${DOCUMENT_PROCESSING_BACKEND:-thread}
      UPLOAD_STORAGE_DIR: /app/data/uploads
      LIVE_REQUIRE_PROVIDER_EMBEDDINGS: ${LIVE_REQUIRE_PROVIDER_EMBEDDINGS:-false}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - uploads_data:/app/data/uploads
    command: python scripts/run_live_smoke.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
