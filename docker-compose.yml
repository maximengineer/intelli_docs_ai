services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      INTELLIDOCS_API_URL: http://backend:8000
    command: >
      sh -c "pip install --no-cache-dir streamlit==1.58.0 requests==2.34.2 &&
             streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "8501:8501"
    depends_on:
      - backend
