services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: intellidocs
      POSTGRES_USER: intellidocs
      POSTGRES_PASSWORD: intellidocs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellidocs -d intellidocs"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://intellidocs:intellidocs@postgres:5432/intellidocs
      EMBEDDING_BACKEND: hash
      REQUIRE_DATABASE_READY: "true"
      VECTOR_STORE_BACKEND: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      INTELLIDOCS_API_URL: http://backend:8000
    command: >
      sh -c "pip install --no-cache-dir streamlit==1.58.0 requests==2.34.2 &&
             streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
